name: update-chromium-extensions

on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-chromium-extensions:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout private nix-configs repository
        uses: actions/checkout@v7
        with:
          repository: ZihanType/nix-configs
          token: ${{ secrets.PRIVATE_REPO_ACCESS_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Update Chromium extensions
        run: python3 scripts/update-chromium-extensions.py

      - name: Verify Chromium extension sources
        run: >-
          nix eval --json
          "path:.#darwinConfigurations.Avalon.config.home-manager.users.arthur.programs.chromium.extensions"
          >/dev/null

      - name: Commit and push extension updates
        run: |
          lock_file="home/app/chromium-extensions/chromium-extensions-lock.json"

          if git diff --quiet -- "$lock_file"; then
            echo "No extension updates"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$lock_file"
          git commit -m "chore(chromium): update extensions"
          git push origin HEAD:main
