      #       core.info(`Deleted ${deleted} caches with prefix ${prefix}`);

      - name: Delete all action caches
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let deleted = 0;

            while (true) {
              const response = await github.request(
                'GET /repos/{owner}/{repo}/actions/caches',
                {
                  owner,
                  repo,
                  per_page: 100,
                },
              );

              const caches = response.data.actions_caches ?? [];

              if (caches.length === 0) {
                break;
              }

              for (const cache of caches) {
                core.info(`Deleting cache ${cache.key} (${cache.id})`);
                await github.request(
                  'DELETE /repos/{owner}/{repo}/actions/caches/{cache_id}',
                  {
                    owner,
                    repo,
                    cache_id: cache.id,
                  },
                );
                deleted += 1;
              }
            }

            core.info(`Deleted ${deleted} caches in total`);