name: cleanup-action-cache

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup-action-cache:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
